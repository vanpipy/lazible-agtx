name = "super-spec"
description = "Spec-driven workflow: research -> planning (gated loop) -> running"

# Essential: Syncs the auditing logic into the active worktree
copy_dirs = [".specify", "skills/"]

[artifacts]
# Research ends when the spec is drafted
research = "specs/*/spec.md"

# THE GATE: agtx will NOT advance to 'running' until this specific file exists.
# It is NOT generated by tools, but by the Agent itself upon successful audit.
planning = ".agtx/audit_passed.md"

# MANUAL: Developer controls when implementation is finished
running = ""

[commands]
research = "/speckit.specify {task}"

# CHAIN: 1. Draft Plan -> 2. Draft Tasks -> 3. Internal Audit
# The chain repeats until super-analyze creates the artifact flag.
planning = "/speckit.plan {task} && /speckit.task && /super-spec.analyze"

running = "/superpowers.subagent-driven-development"

[prompts]
research = "Task: {task}"
planning = """
Your goal is to reach the 'Running' phase. 
To do so, you MUST satisfy the requirements in 'super-analyze'.
If the audit fails, fix the plan/tasks and retry.
If the audit passes, you MUST execute `touch .agtx/audit_passed.md` to unlock the next phase.
"""
running = "Execute implementation. Provide updates. Press 'O' to finish manually."
